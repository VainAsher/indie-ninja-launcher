name: Receive Game Release

# Triggered by repository_dispatch from the game repo when a new game version is released.
# Posts a release announcement issue for launcher users.

on:
  repository_dispatch:
    types: [game-release]

permissions:
  contents: read
  issues: write

jobs:
  announce-release:
    name: Announce New Game Release
    runs-on: ubuntu-latest

    steps:
      - name: Post release announcement issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const version = context.payload.client_payload.version;
            const releaseUrl = context.payload.client_payload.release_url;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Game Release: ${version}`,
              body: [
                `## Indie Ninja Adventures ${version} is now available!`,
                '',
                `**Download**: [GitHub Release](${releaseUrl})`,
                '',
                '### How to update',
                '1. Open the launcher - it will detect the new version automatically',
                '2. Click "Update" to download and verify the latest release assets',
                '',
                '### Issues?',
                'Report at [indie-ninja-feedback](https://github.com/VainAsher/indie-ninja-feedback/issues/new/choose)',
              ].join('\n'),
              labels: ['release'],
            });

            console.log(`Created announcement issue #${issue.data.number}`);
