name: Release Launcher

# Triggered by pushing a version tag: git tag v1.1.0 && git push origin v1.1.0
# Builds ninja_dash_launcher.exe and attaches it to a GitHub Release.
#
# NOTE: The launcher source (launcher/launcher.py) and PyInstaller spec
# (build/ninja_dash_launcher.spec) must be copied from the game repo before building.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Launcher
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build launcher exe
        working-directory: build
        run: pyinstaller --clean ninja_dash_launcher.spec

      - name: Verify launcher exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "build\dist\ninja_dash_launcher.exe")) {
            Write-Error "Missing: build\dist\ninja_dash_launcher.exe"
            exit 1
          }
          Write-Host "Launcher exe built successfully."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Indie Ninja Adventures Launcher ${{ github.ref_name }}" \
            --generate-notes \
            "build/dist/ninja_dash_launcher.exe"
