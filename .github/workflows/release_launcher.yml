name: Release Launcher

# Manual lane for building and publishing ninja_dash_launcher.exe.
# This repo currently requires launcher source/spec files to be mirrored before build:
#   - launcher/launcher.py
#   - build/ninja_dash_launcher.spec

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Launcher
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required build files
        shell: pwsh
        run: |
          if (-not (Test-Path "launcher/launcher.py")) {
            Write-Error "Missing launcher/launcher.py. Sync launcher source into this repo before running release workflow."
            exit 1
          }
          if (-not (Test-Path "build/ninja_dash_launcher.spec")) {
            Write-Error "Missing build/ninja_dash_launcher.spec. Sync launcher spec into this repo before running release workflow."
            exit 1
          }

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build launcher exe
        working-directory: build
        run: pyinstaller --clean ninja_dash_launcher.spec

      - name: Verify launcher exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "build/dist/ninja_dash_launcher.exe")) {
            Write-Error "Missing: build/dist/ninja_dash_launcher.exe"
            exit 1
          }
          Write-Host "Launcher exe built successfully."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" \
            --title "Indie Ninja Adventures Launcher $RELEASE_TAG" \
            --generate-notes \
            "build/dist/ninja_dash_launcher.exe"
