name: Mirror Game Release Assets (Manual)

# Manual distribution-only lane.
# Mirrors assets from a game release tag into this launcher distribution repo.

on:
  workflow_dispatch:
    inputs:
      game_tag:
        description: "Game release tag to mirror (example: v0.11.72)"
        required: true
        type: string

permissions:
  contents: write

env:
  GAME_REPO: VainAsher/indie-ninja-adventures
  LAUNCHER_REPO: VainAsher/indie-ninja-launcher

jobs:
  mirror-release:
    name: Mirror Assets to Launcher Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.game_tag }}"
          if [ -z "$TAG" ]; then
            echo "Missing required input: game_tag"
            exit 1
          fi
          echo "GAME_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download assets from game release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf mirrored-assets
          mkdir -p mirrored-assets
          gh release download "$GAME_TAG" -R "$GAME_REPO" -D mirrored-assets
          if [ -z "$(ls -A mirrored-assets)" ]; then
            echo "No assets downloaded for $GAME_TAG"
            exit 1
          fi
          ls -lah mirrored-assets

      - name: Ensure launcher release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GAME_TAG" -R "$LAUNCHER_REPO" >/dev/null 2>&1; then
            echo "Release $GAME_TAG already exists"
          else
            gh release create "$GAME_TAG" -R "$LAUNCHER_REPO" \
              --title "Indie Ninja Adventures $GAME_TAG" \
              --notes "Mirrored distribution assets from $GAME_REPO release $GAME_TAG."
          fi

      - name: Upload mirrored assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$GAME_TAG" -R "$LAUNCHER_REPO" mirrored-assets/* --clobber
